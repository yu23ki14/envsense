# Git hooks — installed automatically by the root `prepare` script.
# https://lefthook.dev/
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm run typecheck
    no-color-literal:
      glob: "apps/mobile/src/ui/components/**/*.{ts,tsx}"
      run: node apps/mobile/scripts/check-no-color-literals.mjs {staged_files}
